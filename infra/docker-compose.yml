services:
  postgres:
    image: postgres:17
    container_name: keycloak_postgres
    env_file:
      - .env.db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # init-db.sh runs once on the first boot and creates the app_data database
      # alongside the keycloak database (created from POSTGRES_DB).
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - keycloak_net

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - keycloak_net

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev --import-realm
    env_file:
      - .env.keycloak
    ports:
      - "8080:8080"
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm.json
    depends_on:
      - postgres
      - mailpit
    networks:
      - keycloak_net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    # Custom entrypoint: starts the server, then auto-pulls the model on the first boot.
    # On subsequent starts the model is already in the volume and the pull is skipped.
    entrypoint: ["/bin/bash", "/ollama/entrypoint.sh"]
    environment:
      OLLAMA_MODEL: llama3.2:3b
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      # Mount the entrypoint script (read-only)
      - ./ollama/entrypoint.sh:/ollama/entrypoint.sh:ro
    # Healthy once the model appears in the ` ollama list `.
    # Hardcoded model name — Docker Compose expands ${} from the HOST environment
    # at parse time, not from the container's environment section, so using
    # ${OLLAMA_MODEL} here would silently expand to an empty string on most machines.
    # start_period grants first-boot download time before failures are counted.
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -qi 'llama3.2'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    networks:
      - keycloak_net

  fastapi:
    build:
      context: ../fastapi
      dockerfile: Dockerfile
    container_name: fastapi
    env_file:
      - ../fastapi/.env
      - .env.db
      - .env.fastapi.docker
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_started
      keycloak:
        condition: service_started
      # Wait until Ollama has pulled the model before booting FastAPI.
      # This prevents the /quote endpoint from returning 503 on the very first request.
      ollama:
        condition: service_healthy
    networks:
      - keycloak_net

  react:
    build:
      context: ../react
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000/api/v1
        - VITE_KEYCLOAK_URL=http://localhost:8080
        - VITE_KEYCLOAK_REALM=react-demo
        - VITE_KEYCLOAK_CLIENT_ID=react-keycloak
        - VITE_APP_TITLE=React-Keycloak-Docker
    container_name: react
    ports:
      - "5173:80"
    depends_on:
      - fastapi
      - keycloak
    networks:
      - keycloak_net

volumes:
  postgres_data:
  ollama_data:

networks:
  keycloak_net: