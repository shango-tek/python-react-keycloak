server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Gzip Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        application/json
        image/svg+xml;

    # ─── Security Headers ─────────────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options  "nosniff"                             always;
    add_header X-XSS-Protection        "1; mode=block"                       always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ─── SPA Entry Point — never cache index.html ────────────────────────────────
    # Vite injects content-hashed asset URLs into index.html at build time.
    # If the browser caches index.html it will reference stale JS/CSS bundles.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        add_header Expires       "0"                                   always;
    }

    # ─── Hashed Static Assets — cache aggressively ───────────────────────────────
    # Vite outputs JS/CSS/images to /assets/ with content-hashed filenames
    # (e.g. main-Cx3f9aBc.js). The hash changes on every content change, so
    # these files are safe to cache permanently in the browser.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── SPA Fallback Routing ─────────────────────────────────────────────────────
    # All other paths fall through to index.html so React Router handles them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Error Pages ──────────────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
